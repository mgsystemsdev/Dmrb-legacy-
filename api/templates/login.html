{% extends "base.html" %}
{% block title %}DMRB — Sign In{% endblock %}
{% block content %}
<div class="min-h-full flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">DMRB</h1>
      <p class="mt-1 text-sm text-gray-500">Sign in to continue</p>
    </div>

    {% if error %}
    <div class="mb-4 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4 bg-white shadow-sm rounded-lg border border-gray-200 px-6 py-8">
      <input type="hidden" name="next" value="{{ next }}">

      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          id="username" name="username" type="text" required autocomplete="username"
          class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          id="password" name="password" type="password" required autocomplete="current-password"
          class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
        >
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2"
      >
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
