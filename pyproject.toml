[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [
    "frontend",
    "analysis",
    "ui_archive",
    "docs",
    "runs",
    "Diagrams",
    ".venv",
    ".ruff_cache",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — enforce after cleanup pass
    "E402",   # module-level import not at top — board_service uses post-logger imports
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
