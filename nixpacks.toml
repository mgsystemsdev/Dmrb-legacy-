# Nixpacks build config for Railway (DMRB Legacy — Python + React monorepo).
# Schema: https://nixpacks.com/docs/configuration/file
#
# We use the auto-detected Python + Node providers for the toolchain (avoids
# Nix package collisions when pinning versions manually) and override only the
# install and build phases to handle the `frontend/` subfolder layout.

providers = ["python", "node"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements.txt",
  "npm --prefix frontend ci",
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port ${PORT} --proxy-headers --forwarded-allow-ips=*"
