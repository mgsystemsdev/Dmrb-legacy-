# Nixpacks build config for Railway (DMRB Legacy — Python + React monorepo).
# Schema: https://nixpacks.com/docs/configuration/file
#
# We use the auto-detected Python + Node providers for the toolchain (avoids
# Nix package collisions when pinning versions manually) and override the
# install/build phases to handle the `frontend/` subfolder layout AND to
# create the virtualenv at /opt/venv that the Nixpacks image expects on
# NIXPACKS_PATH. Replacing phases.install.cmds drops the provider's default
# venv-creation step, so we re-implement it here.

providers = ["python", "node"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "npm --prefix frontend ci",
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",
]

[start]
cmd = "/opt/venv/bin/uvicorn api.main:app --host 0.0.0.0 --port ${PORT} --proxy-headers --forwarded-allow-ips=*"
